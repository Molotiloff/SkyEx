name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev tooling
        run: pip install -r requirements-dev.txt
      - name: ruff check
        run: ruff check --output-format=github .

  typecheck:
    name: Mypy (type-check, non-blocking)
    runs-on: ubuntu-latest
    # Soft rollout: mypy reports type issues for signal but does NOT block PRs yet
    # (config in pyproject.toml is intentionally lenient). Once a layer is clean,
    # tighten pyproject mypy settings and flip continue-on-error to false.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev tooling
        run: pip install -r requirements-dev.txt
      - name: mypy
        run: mypy .
